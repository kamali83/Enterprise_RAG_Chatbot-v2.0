<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG SaaS Chatbot — Enterprise AI Assistant</title>
    <meta name="description" content="Enterprise RAG-powered AI chatbot for intelligent document Q&A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-screen">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                            <circle cx="20" cy="20" r="18" stroke="url(#grad1)" stroke-width="2.5" />
                            <path d="M14 20l4 4 8-8" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#7c3aed"/>
                                    <stop offset="100%" stop-color="#06b6d4"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1>RAG Chatbot</h1>
                    <p class="auth-subtitle">Enterprise AI Assistant</p>
                </div>
                <div id="auth-message" class="auth-message" style="display:none;"></div>
                <div class="auth-form">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    </div>
                    <div class="auth-buttons">
                        <button id="btn-login" class="btn btn-primary" onclick="login()">Log In</button>
                        <button id="btn-signup" class="btn btn-secondary" onclick="signup()">Sign Up</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" style="display:none;">
            <header class="chat-header">
                <div class="header-left">
                    <div class="logo-icon-sm">
                        <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
                            <circle cx="20" cy="20" r="18" stroke="url(#grad2)" stroke-width="2.5" />
                            <path d="M14 20l4 4 8-8" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#7c3aed"/>
                                    <stop offset="100%" stop-color="#06b6d4"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="header-title">RAG Chatbot</span>
                </div>
                <div class="header-right">
                    <span id="user-badge" class="user-badge"></span>
                    <button id="btn-docs" class="btn btn-icon" onclick="openDocumentsModal()" title="Manage Documents">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <span>Docs</span>
                    </button>
                    <button id="btn-new-conv" class="btn btn-icon" onclick="newConversation()" title="New Conversation">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>New Chat</span>
                    </button>
                </div>
            </header>

            <div class="chat-body">
                <!-- Sidebar -->
                <aside class="sidebar" id="sidebar">
                    <div class="sidebar-header">Conversations</div>
                    <div id="tabs" class="tab-list"></div>
                </aside>

                <!-- Main Chat -->
                <main class="chat-main">
                    <div id="messages" class="messages-area">
                        <div class="welcome-msg" id="welcome-msg">
                            <div class="welcome-icon">💬</div>
                            <h2>Welcome!</h2>
                            <p>Ask me anything about your documents. I'll find the most relevant information for you.</p>
                        </div>
                    </div>
                    <div class="input-bar">
                        <div class="input-wrapper">
                            <input type="text" id="query" placeholder="Type your question and press Enter..." autocomplete="off" />
                            <button id="btn-send" onclick="sendQuery()" title="Send message">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Documents Modal -->
    <div id="documents-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content docs-modal">
            <div class="modal-header">
                <h3>Document Management</h3>
                <button class="modal-close" onclick="closeDocumentsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="upload-area">
                    <div class="upload-icon">📁</div>
                    <p>Drag & drop files here or click to upload</p>
                    <p class="upload-hint">Supported: PDF, TXT, DOCX, MD</p>
                    <input type="file" id="file-input" accept=".txt,.pdf,.docx,.md" style="display:none;" onchange="handleFileUpload(this.files[0])" />
                    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Select Files</button>
                </div>
                <div class="documents-list" id="documents-list">
                    <!-- Documents will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
